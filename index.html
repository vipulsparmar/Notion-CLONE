<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="login-screen" class="screen">
      <div class="login-card">
        <h1>Notes</h1>
        <p class="subtitle">Sign in to continue</p>
        <form id="login-form">
          <label for="username">Username</label>
          <input id="username" type="text" autocomplete="username" required />

          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            required
          />

          <button type="submit">Login</button>
          <p id="login-error" class="error-message" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <div id="app-screen" class="screen hidden" aria-hidden="true">
      <aside class="sidebar">
        <h2>Notes</h2>
        <input
          id="search-input"
          type="text"
          placeholder="Search notes..."
          aria-label="Search notes"
        />
        <button id="new-note-btn" class="new-note-btn">New Note</button>
        <ul id="notes-list" class="notes-list"></ul>
      </aside>

      <main class="editor">
        <div class="editor-header">
          <input
            id="note-title"
            type="text"
            placeholder="Untitled"
            aria-label="Note title"
            disabled
          />
          <button id="delete-note-btn" class="delete-note-btn" disabled>
            Delete
          </button>
        </div>
        <textarea
          id="note-content"
          placeholder="Start writing..."
          aria-label="Note content"
          disabled
        ></textarea>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
